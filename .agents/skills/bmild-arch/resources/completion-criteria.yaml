meta:
  artifact: system-design.md
  governed_by: bmild-arch
  loading_note: >
    Load before writing the output artifact. For each section that applies, privately
    check whether your draft exhibits the good_signal or the weak_signal. Check the
    falsifiable field: could a developer execute against this contract without making
    an architectural decision? Resolve gaps through architecture elicitation; do not present this
    file to the user. Record user-owned gaps as Open Technical Questions and route
    out-of-scope gaps as Handoff Questions with target responder and consequence.

sections:

  - id: tech_stack
    required: false
    applies_when: platform engagement or any new runtime, framework, or library dependency
    cross_ref: []
    falsifiable: >
      A developer can determine the runtime version, framework, and key library choices
      for every new component introduced, without asking a follow-up architecture
      question.
    good_signal: >
      Every new technology choice names the specific version or version constraint,
      its role, and why it was chosen over at least one alternative. Existing choices
      are confirmed unchanged or explicitly superseded.
    weak_signal: >
      Choices named without version or rationale, or a stack described at category
      level ("use a relational database") without specifying the product.

  - id: database_schema
    required: false
    applies_when: any change to persisted data structures
    cross_ref:
      - spec.md
    falsifiable: >
      A developer can run the code-first migration tool against this schema spec and
      produce the correct migration without resolving any ambiguity.
    good_signal: >
      Every table change specifies column names, types, nullability, defaults, PKs,
      FKs, indexes, and uniqueness constraints at the column level. Migration intent
      is stated (what the migration tool is expected to generate).
    weak_signal: >
      Columns described without types or nullability, constraints stated in prose
      without specifying enforcement layer (ORM vs app vs DB), or migration intent
      absent.

  - id: api_contracts
    required: false
    applies_when: any client-server or service-to-service boundary is introduced or changed
    cross_ref:
      - spec.md
      - ux-design.md
    falsifiable: >
      A frontend developer and a backend developer can implement both sides of each
      endpoint independently and their implementations will integrate correctly on
      first attempt.
    good_signal: >
      Every endpoint specifies method, path, auth requirement, all request fields with
      types and required/optional status, and all response shapes with status codes and
      error meanings. Pagination, filtering, and sorting behavior is explicit if applicable.
    weak_signal: >
      Endpoints described without response shapes, or error conditions described
      abstractly ("returns an error if something goes wrong") without status codes
      or distinguishable error payloads.

  - id: service_contracts
    required: false
    applies_when: any internal service layer method is introduced or changed
    cross_ref:
      - spec.md
    falsifiable: >
      A developer can write a unit test for a service method's inputs, outputs, and
      error cases from this contract alone, without reading the implementation.
    good_signal: >
      Every service method specifies parameter names and types, return type, and all
      error conditions it throws or returns. Side effects (writes, events, queue
      messages) are named.
    weak_signal: >
      Methods described by intent only ("handles user creation") without parameter or
      return type specification, or error conditions stated in aggregate rather than
      per-method.

  - id: dependency_decisions
    required: false
    applies_when: any new external library, service, or infrastructure component is introduced
    cross_ref: []
    falsifiable: >
      A reviewer can evaluate whether the dependency was justified by reading this
      section alone, without access to the original discussion.
    good_signal: >
      The dependency is justified against at least one alternative with explicit
      trade-off rationale. The constraint it imposes on the existing system (versioning,
      security surface, build process) is acknowledged.
    weak_signal: >
      Dependency named without alternatives considered, or justification is a claim
      ("it is the best option") without evidence or trade-off.

  - id: architecture_decisions
    required: false
    applies_when: any significant technical choice with more than one viable approach
    cross_ref:
      - prd.md
    falsifiable: >
      For each decision, a reviewer can state what was decided, what alternatives were
      considered, and why the chosen approach was preferred — without access to the
      original discussion.
    good_signal: >
      Each significant architecture decision documents the context (why a decision was
      needed), at least two alternatives with pros and cons, the decision and rationale,
      and the consequence of the choice. Decisions that are preferences (no observable
      difference between options) are labelled as such.
    weak_signal: >
      Decisions stated without alternatives, rationale that is a restatement of the
      choice rather than a reason for it, or decisions that hide preferences as
      architectural requirements.

  - id: fr_coverage
    required: true
    cross_ref:
      - prd.md
    falsifiable: >
      A reviewer can map each functional requirement from prd.md to at least one
      architectural element (endpoint, schema, service method, or decision) — no FR is
      left without an implementable contract.
    good_signal: >
      Every functional requirement from prd.md is supported by the system design. If an
      FR has no corresponding endpoint, schema change, service contract, or decision, it
      is flagged as a gap or routed as a Handoff Question. The mapping is derivable — a
      developer can implement each FR by following the contracts in this document.
    weak_signal: >
      Functional requirements from the PRD have no visible architectural support, or
      coverage is assumed without being traceable to specific endpoints, schemas, or
      service methods.

  - id: question_closure
    required: false
    cross_ref:
      - spec.md
      - ux-design.md
    falsifiable: >
      Every Open Technical Question and Handoff Question has target responder, status,
      and consequence if deferred.
    good_signal: >
      User-owned architecture questions are resolved or explicitly deferred by the user
      before handoff. Product or UX questions are routed to Faisal or Katrina with
      enough context for that persona to answer without reconstructing the architecture
      session.
    weak_signal: >
      Questions are logged without an owner, status, or consequence, or an unresolved
      architecture-domain question is handed off as if design were complete.

meta:
  artifact: spec.md
  governed_by: bmild-pm
  loading_note: >
    Load before writing the output artifact. For each section that applies, privately
    check whether your draft exhibits the good_signal or the weak_signal. Resolve gaps
    through further elicitation or record them as Open Questions. Do not present this
    file to the user.

sections:

  - id: problem_statement
    required: true
    cross_ref: []
    good_signal: >
      One sentence naming the specific user pain or system gap, with a condition that
      could be observed or tested to confirm the problem exists.
    weak_signal: >
      Abstract or solution-framed statement ("we need a feature that..."), or a
      statement that cannot be verified without the missing feature itself.

  - id: users_stakeholders
    required: true
    cross_ref:
      - ux-design.md
    good_signal: >
      At least two distinct user segments are named with different needs or constraints.
      Non-user stakeholders (ops, compliance, etc.) are identified separately from users.
    weak_signal: >
      A single generic user type ("the user") or a list of roles without distinction of
      what each cares about differently.

  - id: project_context
    required: false
    applies_when: platform engagement or brownfield project
    cross_ref:
      - system-design.md
    good_signal: >
      Greenfield or brownfield is stated explicitly. If brownfield, the existing system
      constraint that shapes this work is named. Domain is identified at a level of
      specificity useful to architecture (e.g., "multi-tenant SaaS with per-org data
      isolation" not "enterprise software").
    weak_signal: >
      No project type stated, or domain described at a level too general to constrain
      any technical or UX decision.

  - id: user_journey
    required: false
    applies_when: any requirement involves user-facing behavior or workflow change
    cross_ref:
      - ux-design.md
    good_signal: >
      At least one end-to-end sequence is described: named trigger → steps → success
      exit. Edge or failure paths are acknowledged even if not fully specified.
    weak_signal: >
      Only a feature description with no sequence, or a journey that starts and ends
      at the happy path without identifying what triggers it or what happens on failure.

  - id: requirements_must_have
    required: true
    cross_ref:
      - ux-design.md
      - system-design.md
    good_signal: >
      Each Must Have can be read in isolation and answered yes/no by a tester who has
      never seen the rest of the spec. A verifiable condition is embedded or obviously
      derivable (e.g., "user can export a CSV of results" — pass condition is a
      downloadable file with correct rows).
    weak_signal: >
      Requirements that describe intent without observable outcome ("the system should
      be intuitive"), requirements that bundle multiple distinct behaviors in one
      bullet, or requirements with no observable verification condition.

  - id: success_criteria
    required: true
    cross_ref: []
    good_signal: >
      Each criterion is stated as an observable outcome after the feature ships —
      something a reviewer could check in a running system or test suite. At least one
      criterion is measurable rather than qualitative.
    weak_signal: >
      Criteria that restate requirements ("feature is implemented"), or criteria so
      qualitative that two reviewers would disagree on whether they are met
      ("users find it easy").

  - id: nfr
    required: false
    applies_when: any requirement touches performance, scale, data retention, security, compliance, or regulated data handling
    cross_ref:
      - system-design.md
    good_signal: >
      Each NFR names a threshold (a specific number, SLA, or constraint) plus the
      scenario that triggers it (e.g., "p99 response < 500ms under 1000 concurrent
      users"). Regulatory constraints name the specific obligation.
    weak_signal: >
      Phrases like "should be fast", "must be secure", or "highly available" with no
      threshold. Compliance obligations named without citing the specific rule or
      obligation they impose.

  - id: open_questions
    required: false
    cross_ref: []
    good_signal: >
      Each open question names a specific decision that, if resolved differently, would
      materially change a Must Have requirement or a downstream design artifact.
    weak_signal: >
      Questions that could be answered without changing any requirement ("what colour
      should the button be?"), or questions that are purely rhetorical.

  - id: assumptions
    required: false
    cross_ref: []
    good_signal: >
      Each assumption names specifically what would change in the spec if the assumption
      turns out to be wrong (e.g., "Assuming SSO is available — if not, auth story
      expands by at least one additional Must Have").
    weak_signal: >
      Assumptions listed without a stated consequence of being wrong, or assumptions
      that are actually constraints already confirmed by evidence.

meta:
  artifact: product-brief.md
  governed_by: bmild-pm
  loading_note: >
    Load before writing product-brief.md. Each section carries a `stakes` hint that
    sets default elicitation depth per the Craft Standards stakes rubric
    (consequential / medium / low). Probe consequential items one question at a time;
    synthesize-and-steer for medium and low. For each section, privately check whether
    your draft exhibits the good_signal or the weak_signal, and check the falsifiable
    field: is there an observable condition that confirms this section is complete?
    Resolve gaps through elicitation calibrated to stakes, route discrete user input
    to `user-attention.md`, or use a bounded assumption only when it is low-risk and
    reversible. Do not present this file to the user.

sections:

  - id: problem
    required: true
    stakes: consequential
    falsifiable: >
      A reviewer can state the specific pain, name who feels it, and describe how to
      confirm it exists — without reading any other section.
    good_signal: >
      Specific user pain named with a condition that could be observed to confirm it
      exists. Real scenarios, not abstractions. The cost of the status quo is named.
    weak_signal: >
      Abstract or solution-framed statement, or a statement that cannot be verified
      without the missing product itself.

  - id: solution
    required: true
    stakes: medium
    falsifiable: >
      A reviewer unfamiliar with the domain can describe what users do and what outcome
      they get — without reading the problem statement.
    good_signal: >
      Describes the experience and outcome the product creates, not the implementation.
      A reader unfamiliar with the domain could picture what users do and feel.
    weak_signal: >
      Describes technical implementation, a feature list, or mirrors the problem statement
      without explaining how anything changes for users.

  - id: target_users
    required: true
    stakes: consequential
    cross_ref:
      - ux-design.md
    falsifiable: >
      A reviewer can name each user segment, their distinct need, and what success looks
      like for them — without inferring from other sections.
    good_signal: >
      At least one user segment is vivid: named role or archetype, specific need, and what
      success looks like for them. B2B products name buyer and user separately when they
      differ. Non-user stakeholders identified separately when relevant.
    weak_signal: >
      Generic label ("the user") or a role list without articulating what each segment
      specifically needs or why they differ.

  - id: competitive_context
    required: true
    stakes: medium
    falsifiable: >
      A reviewer can name at least one alternative approach and state the specific reason
      this product differs — without additional context.
    good_signal: >
      Names at least one alternative or incumbent approach. States a specific reason this
      product is different or better. If the advantage is execution speed rather than a
      technical moat, says so plainly rather than inventing differentiation.
    weak_signal: >
      Claims differentiation without naming what it differs from, or uses vague language
      ("best in class", "superior") without a specific contrast.

  - id: success_criteria
    required: true
    stakes: consequential
    falsifiable: >
      At least one criterion can be checked against a running product or business metric
      with a clear pass or fail threshold. Others are stated as observable outcomes.
    good_signal: >
      Vision-level outcomes that would hold across multiple initiatives. At least one is
      measurable — a reviewer could check a running product or business metric and
      determine pass or fail.
    weak_signal: >
      Criteria that restate features ("users can do X"), single-initiative goals that do
      not generalize, or qualitative claims so vague that two reviewers would disagree.

  - id: scope
    required: true
    stakes: medium
    falsifiable: >
      A downstream persona can read this section and determine whether any given feature
      idea is in scope, out of scope, or deferred — without asking a follow-up question.
    good_signal: >
      Names what is in for the first initiative and what is explicitly not in scope. Tight
      enough to act as a boundary document. A downstream persona could read it and know
      what not to design.
    weak_signal: >
      Scope that is actually a feature list, or scope so broad that it excludes nothing
      and gives no design signal.

  - id: vision
    required: true
    stakes: medium
    falsifiable: >
      A reviewer can state what this product becomes in 2-3 years and distinguish it from
      the first initiative scope.
    good_signal: >
      States a long-term direction that is more ambitious than the first initiative but
      still grounded. A reader could identify what this product becomes, not just what it
      starts as.
    weak_signal: >
      Repeats the first initiative scope, uses marketing language without direction, or is
      so vague it could describe any product in the category.

  - id: project_context
    required: false
    stakes: medium
    applies_when: brownfield project or platform engagement
    cross_ref:
      - system-design.md
    falsifiable: >
      A reviewer can determine whether this is greenfield or brownfield and name the
      domain constraints that shape the work — without reading other artifacts.
    good_signal: >
      Greenfield or brownfield is stated explicitly. If brownfield, the existing system
      constraint that shapes this work is named. Domain is identified at a level of
      specificity useful to downstream personas (e.g., "multi-tenant SaaS with per-org
      data isolation" not "enterprise software"). Regulatory or compliance constraints
      are surfaced if applicable.
    weak_signal: >
      No project context stated, or domain described at a level too general to constrain
      any technical or UX decision.

  - id: governance_routing
    required: false
    stakes: low
    falsifiable: >
      A reviewer can tell whether unresolved ambiguity was routed to `user-attention.md`,
      a bounded assumption, or an explicit defer/reject/supersede outcome without
      relying on chat history.
    good_signal: >
      Material unresolved ambiguity is routed through governed artifacts rather than
      embedded question threads. If user input is still required, the queue item carries
      one discrete prompt, enough context, and a clear promotion target.
    weak_signal: >
      Durable question sections inside `product-brief.md`, ambiguous ownership, or
      unresolved product ambiguity left only in chat.
